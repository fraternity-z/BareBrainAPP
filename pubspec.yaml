name: bare_brain_app
description: LAN chat client for BareBrain.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  chinese_font_library: 1.1.0
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_markdown_plus_latex: ^1.0.5
  markdown: ^7.3.1
  shared_preferences: ^2.3.3
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/barebrain_app_icon_1024.png
